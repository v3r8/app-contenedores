name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer and Accept Licenses
        run: |
          pip install --upgrade pip
          pip install buildozer
          # Forzamos la creación de la carpeta del SDK para evitar errores
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # buildozer intentará instalar el SDK, pero si falla, esto ayuda
          buildozer android clean

      - name: Build
        run: |
          # Aceptamos las licencias automáticamente antes de compilar
          # Este es el truco para que no se detenga en "Accept? (y/N)"
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # Lanzamos la compilación
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk

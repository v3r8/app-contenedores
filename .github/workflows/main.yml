name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias necesarias
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev

      - name: Limpiar y preparar
        run: |
          # Borramos cualquier rastro previo
          rm -rf .buildozer
          mkdir -p .buildozer

      - name: Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip
          pip install --upgrade buildozer
          pip install cython==0.29.33

      - name: Ejecutar compilación
        run: |
          # Ejecutamos buildozer directamente
          buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk

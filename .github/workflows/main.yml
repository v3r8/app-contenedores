name: Compilar APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          # He cambiado libtinfo5 por libtinfo-dev para que sea compatible con Ubuntu 24.04
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev
          pip install --upgrade buildozer cython

      - name: Aceptar licencias y compilar
        run: |
          # Crear directorios necesarios
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          # Compilar
          buildozer android debug
          
      - name: Subir APK resultante
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk

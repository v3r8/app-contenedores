name: CI
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    
    - name: Configurar Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Aceptar licencias de Android
      run: |
        mkdir -p /home/runner/.android/
        touch /home/runner/.android/repositories.cfg
        # Esto instala los command-line tools necesarios y acepta las licencias
        yes | sdkmanager --licenses || echo "Licencias aceptadas"

    - name: Compilar con Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        buildozer_version: latest
      env:
        # Esto es vital para que buildozer no falle al buscar herramientas
        ANDROID_HOME: /usr/local/lib/android/sdk

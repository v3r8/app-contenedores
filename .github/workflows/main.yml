name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev

      - name: Build with Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer
          # Forzamos a Buildozer a descargar el SDK y las herramientas necesarias
          # Buildozer suele hacer esto solo, pero si falla, es que no tiene permiso o ruta
          export BUILDOZER_HOME=$GITHUB_WORKSPACE/.buildozer
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk

name: Compilar APK Android

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk python3-venv autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev

      - name: Construir la App con Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer
          # Buildozer descargará el SDK y NDK automáticamente
          buildozer android debug

      - name: Subir el archivo APK generado
        uses: actions/upload-artifact@v4
        with:
          name: app-android
          path: bin/*.apk

name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev

      - name: Aceptar licencias (FORZADO)
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          # Este es el comando "mágico" que suele saltarse el error de AIDL
          yes | sdkmanager --licenses || true

      - name: Compilar
        run: |
          pip install --upgrade pip
          pip install buildozer
          # Añadimos un paso de limpieza por si hay basura de intentos anteriores
          buildozer android clean
          buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk

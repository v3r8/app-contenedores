- name: Construir la App
        run: |
          pip install --upgrade pip
          pip install buildozer
          # Primero ejecutamos buildozer para que descargue el SDK y las herramientas
          # Si falla por licencia, lo forzamos a aceptar las licencias en la ruta correcta
          buildozer android debug || ( \
            echo "El build falló, intentando aceptar licencias..." && \
            find /home/runner/.buildozer -name sdkmanager -exec sh -c 'yes | {} --licenses' \; && \
            buildozer android debug \
          )
          

name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev

      - name: Build with Buildozer
        run: |
          # 1. Preparar Python y herramientas
          pip install --user --upgrade pip
          pip install --user buildozer
          export PATH=$PATH:~/.local/bin
          
          # 2. Configurar Buildozer para que no pida confirmación manual
          # Esto evita el error de "broken pipe" y la falta de licencias
          export BUILDOZER_HOME=$GITHUB_WORKSPACE/.buildozer
          
          # 3. Lanzar la compilación
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk

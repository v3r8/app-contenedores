name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev

      - name: Force Accept Licenses
        run: |
          # Creamos la carpeta donde el SDK espera las licencias
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          # Instalamos cmdline-tools y aceptamos licencias de forma forzada
          # Esto es lo que evita que el proceso se detenga esperando tu respuesta
          yes | sdkmanager --licenses || true

      - name: Build with Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer
          # Ejecutamos la compilación
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk
          
